  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body { background:#fff; color:#222; font-family: 'Roboto', sans-serif; transition: background 0.3s; }
    body.dark-mode { background:#111; color:#e9e9e9; }
    
    /* Centered layout */
    .content-area { 
      max-width: 1400px; 
      margin: 0 auto; 
      padding: 40px 20px; 
    }

    /* Navigation controls */
    .sidebar-toggle, .dark-mode-toggle {
      width: 45px; height: 45px; position: fixed; top:15px; z-index:4000;
      border:none; cursor:pointer; background:#e0e0e0; color:#333; border-radius:50%;
      box-shadow:0 2px 8px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center;
    }
    #sidebarToggle { left:15px; } #darkModeToggle { right:15px; }
    body.dark-mode .sidebar-toggle, body.dark-mode .dark-mode-toggle { background:#333; color:#f0f0f0; }

    .sidebar {
      position:fixed; top:0; left:0; height:100vh; width:280px;
      background:#fff; transform:translateX(-100%); transition:transform 0.3s ease; 
      z-index:3500; box-shadow:2px 0 12px rgba(0,0,0,0.1); display:flex; flex-direction:column;
    }
    body[data-sidebar="open"] .sidebar { transform:translateX(0); }
    body.dark-mode .sidebar { background:#1b1b1b; }
    .sidebar-menu { list-style:none; padding:70px 0 20px; overflow-y:auto; flex:1; }
    .sidebar-button { display:block; padding:10px 20px; color:inherit; text-decoration:none; font-size: 0.85rem; border-left: 4px solid transparent; }
    .sidebar-button:hover { background: rgba(0,0,0,0.05); border-left-color: #3273dc; }
    .ds-group-label { padding: 10px 20px; font-weight: 800; font-size: 0.7rem; color: #3273dc; margin-top: 15px; text-transform: uppercase; }

    /* 3-Column Grid for subplots */
    .ds-header { font-size: 2rem; font-weight: 800; margin: 3rem 0 1.5rem; color: #3273dc; border-bottom: 4px solid #3273dc; display: inline-block; }
    .cat-label { font-size: 1.4rem; font-weight: 700; margin: 2rem 0 1rem; color: #555; }
    body.dark-mode .cat-label { color: #ccc; }

    .sample-container { 
      background: rgba(0,0,0,0.02); 
      border-radius: 15px; 
      padding: 25px; 
      margin-bottom: 50px; 
      border: 1px solid #eee;
    }
    body.dark-mode .sample-container { background: rgba(255,255,255,0.02); border-color: #333; }

    .sample-info-header { font-weight: 700; color: #3273dc; margin-bottom: 20px; font-size: 1.1rem; border-bottom: 1px solid #ddd; padding-bottom: 10px; }

    .methods-grid { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 20px; 
    }
    
    .method-card { 
      background: #fff; 
      border: 1px solid #eee; 
      border-radius: 10px; 
      padding: 12px; 
      display: flex; 
      flex-direction: column; 
    }
    body.dark-mode .method-card { background: #222; border-color: #444; }
    .ref-card { border: 2px solid #3273dc; background: #f0f7ff; }
    body.dark-mode .ref-card { background: #1a2638; border-color: #3273dc; }

    /* Label updated to show real name */
    .model-label { font-size:.8rem; font-weight:700; margin: 0 0 8px; text-transform: none; color: #333; }
    body.dark-mode .model-label { color: #eee; }
    
    img { border-radius: 4px; width: 100%; margin-bottom: 8px; border: 1px solid #f9f9f9; }
    audio { width: 100%; height: 30px; }
  </style>
</head>

    // ----------------------------------------

    const ASSET_PATH = 'figs/';

    function render(data) {
      if (!data || data.length === 0) return;
      const container = document.getElementById('main-content');
      const menu = document.getElementById('menuList');
      
      const hierarchy = data.reduce((acc, item) => {
        if (!acc[item.dataset]) acc[item.dataset] = {};
        if (!acc[item.dataset][item.category]) acc[item.dataset][item.category] = [];
        acc[item.dataset][item.category].push(item);
        return acc;
      }, {});

      Object.keys(hierarchy).forEach(ds => {
        const dsHeader = document.createElement('h2');
        dsHeader.className = 'ds-header';
        dsHeader.innerText = ds;
        container.appendChild(dsHeader);

        const dsMenu = document.createElement('div');
        dsMenu.className = 'ds-group-label';
        dsMenu.innerText = ds;
        menu.appendChild(dsMenu);

        Object.keys(hierarchy[ds]).forEach((cat, cIdx) => {
          const sid = `sec_${ds.replace(/\s/g,'')}_${cIdx}`;
          const li = document.createElement('li');
          li.innerHTML = `<a href="#${sid}" class="sidebar-button">${cat}</a>`;
          menu.appendChild(li);

          const sec = document.createElement('section');
          sec.id = sid;
          sec.innerHTML = `<div class="cat-label">${cat}</div>`;
          
          hierarchy[ds][cat].forEach(sample => {
            const sampleBox = document.createElement('div');
            sampleBox.className = 'sample-container';
            sampleBox.innerHTML = `<div class="sample-info-header">Sample ID: ${sample.id}</div>`;
            
            const grid = document.createElement('div');
            grid.className = 'methods-grid';

            // Reference Block
            const refHtml = `
              <div class="method-card ref-card">
                <div class="model-label" style="color:#3273dc">Reference (GT)</div>
                <img src="${ASSET_PATH}${sample.ref.plot}">
                <audio controls src="${ASSET_PATH}${sample.ref.audio}"></audio>
              </div>`;
            
            // Generate Method blocks using REAL NAMES
            // We use the keys from sample.models directly
            const modelKeys = Object.keys(sample.models); 
            const methodsHtml = modelKeys.map((mKey) => `
              <div class="method-card">
                <div class="model-label">${mKey}</div>
                <img src="${ASSET_PATH}${sample.models[mKey].plot}" loading="lazy">
                <audio controls src="${ASSET_PATH}${sample.models[mKey].audio}"></audio>
              </div>
            `).join('');

            grid.innerHTML = refHtml + methodsHtml;
            sampleBox.appendChild(grid);
            sec.appendChild(sampleBox);
          });
          container.appendChild(sec);
        });
      });
    }

    // Navigation Toggle
    const body = document.body;
    document.getElementById('sidebarToggle').onclick = (e) => {
      e.stopPropagation();
      body.setAttribute('data-sidebar', body.getAttribute('data-sidebar') === 'open' ? '' : 'open');
    };
    document.addEventListener('click', (e) => {
      if (body.getAttribute('data-sidebar') === 'open' && !e.target.closest('#sidebar')) {
        body.removeAttribute('data-sidebar');
      }
    });

    document.getElementById('darkModeToggle').onclick = () => {
      body.classList.toggle('dark-mode');
      localStorage.setItem('dark', body.classList.contains('dark-mode'));
    };
    if(localStorage.getItem('dark') === 'true') body.classList.add('dark-mode');
    
    render(EMBEDDED_METADATA);
  </script>
